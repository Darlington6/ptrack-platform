services:
  # ── Web service (Django + Gunicorn) ─────────────────────────────────────────
  - type: web
    name: ptrack-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && gunicorn ptrack.wsgi:application
    envVars:
      - key: DEBUG
        value: "false"
      # Secrets — set these in the Render dashboard (service → Environment):
      # SECRET_KEY, DATABASE_URL, REDIS_URL, ALLOWED_HOSTS,
      # CORS_ALLOWED_ORIGINS, SENTRY_DSN, BREVO_API_KEY, DEFAULT_FROM_EMAIL,
      # GOOGLE_MAPS_API_KEY, GOOGLE_OAUTH_CLIENT_ID,
      # VAPID_PUBLIC_KEY, VAPID_PRIVATE_KEY, VAPID_SUBJECT,
      # USE_CLOUDINARY, CLOUDINARY_CLOUD_NAME, CLOUDINARY_API_KEY,
      # CLOUDINARY_API_SECRET, APP_VERSION

  # ── Cron: cleanup verification codes  (daily  03:00 CAT = 01:00 UTC) ────────
  - type: cron
    name: ptrack-cleanup-verification-codes
    runtime: python
    rootDir: backend
    schedule: "0 1 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py cleanup_verification_codes
    envVars:
      - key: DEBUG
        value: "false"