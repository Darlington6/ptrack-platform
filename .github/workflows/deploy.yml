name: Deploy

"on":
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

permissions:
  contents: read

jobs:
  deploy-backend:
    name: Deploy Backend (Render)
    runs-on: ubuntu-24.04
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 15
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}

    steps:
      - name: Trigger Render deploy
        if: env.RENDER_API_KEY != '' && env.RENDER_SERVICE_ID != ''
        run: |
          curl -s -f -X POST \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{}'

  notify:
    name: Notify
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [deploy-backend]
    if: always()
    # env:
    #   NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}

    steps:
      - name: Send deploy notification
        if: false  # set NOTIFY_WEBHOOK_URL secret and restore env block above to enable
        run: |
          STATUS="success"
          if [[ "${{ needs.deploy-backend.result }}" == "failure" ]]; then
            STATUS="failure"
          fi
          curl -s -X POST "$NOTIFY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"Deploy $STATUS on \`${{ github.ref_name }}\` by ${{ github.actor }}\"}" \
            || true