name: Deploy

"on":
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy-backend:
    name: Deploy Backend (Render)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}

    steps:
      - name: Trigger Render deploy
        if: env.RENDER_API_KEY != '' && env.RENDER_SERVICE_ID != ''
        run: |
          curl -s -f -X POST \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{}'

  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        if: env.VERCEL_TOKEN != ''
        working-directory: frontend
        run: npx vercel@latest --prod --yes
        env:
          VERCEL_TOKEN: ${{ env.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  notify:
    name: Notify
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [deploy-backend, deploy-frontend]
    if: always()
    env:
      NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}

    steps:
      - name: Send deploy notification
        if: env.NOTIFY_WEBHOOK_URL != ''
        run: |
          STATUS="success"
          if [[ "${{ needs.deploy-backend.result }}" == "failure" || "${{ needs.deploy-frontend.result }}" == "failure" ]]; then
            STATUS="failure"
          fi
          curl -s -X POST "$NOTIFY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"Deploy $STATUS on \`${{ github.ref_name }}\` by ${{ github.actor }}\"}" \
            || true