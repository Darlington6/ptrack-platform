name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Backend: Railway ─────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Railway)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    if: ${{ vars.RAILWAY_ENABLED == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        if: ${{ secrets.RAILWAY_TOKEN != '' }}
        uses: bervProject/railway-deploy@v1.3.0
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        with:
          service: backend

  # ── Frontend: Vercel ─────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        uses: amondnet/vercel-action@v25.2.0
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: --prod

  # ── Notify ───────────────────────────────────────────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: [deploy-backend, deploy-frontend]
    if: always()

    steps:
      - name: Notify Slack / Discord
        if: ${{ secrets.NOTIFY_WEBHOOK_URL != '' }}
        run: |
          STATUS="success"
          if [[ "${{ needs.deploy-backend.result }}" == "failure" || "${{ needs.deploy-frontend.result }}" == "failure" ]]; then
            STATUS="failure"
          fi
          curl -s -X POST "${{ secrets.NOTIFY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"Deploy $STATUS on \`${{ github.ref_name }}\` by ${{ github.actor }}\"}" \
            || true