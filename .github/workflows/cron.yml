# Fires scheduled management commands against the Render backend via a shared CRON_SECRET
name: Scheduled Tasks

on:
  schedule:
    # Streak warnings — daily at 19:00 CAT (UTC+2 = 17:00 UTC)
    - cron: '0 17 * * *'
    # Weekly digest — every Sunday at 18:00 CAT (UTC+2 = 16:00 UTC)
    - cron: '0 16 * * 0'
  workflow_dispatch:
    inputs:
      command:
        description: 'Management command to run'
        required: true
        type: choice
        options:
          - send_streak_warnings
          - send_weekly_digest

jobs:
  run-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Determine command
        id: cmd
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "command=${{ github.event.inputs.command }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 17 * * *" ]; then
            echo "command=send_streak_warnings" >> $GITHUB_OUTPUT
          else
            echo "command=send_weekly_digest" >> $GITHUB_OUTPUT
          fi

      - name: Trigger command on Render
        run: |
          echo "Running: ${{ steps.cmd.outputs.command }}"
          HTTP_STATUS=$(curl -s -o /tmp/cron_response.txt -w "%{http_code}" \
            --max-time 300 \
            --retry 2 \
            --retry-delay 30 \
            -X POST \
            "${{ secrets.RENDER_BACKEND_URL }}/api/v1/internal/cron/${{ steps.cmd.outputs.command }}/" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}")
          echo "HTTP status: $HTTP_STATUS"
          cat /tmp/cron_response.txt
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Command failed with HTTP $HTTP_STATUS"
            exit 1
          fi