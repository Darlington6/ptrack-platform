name: CI

"on":
  push:
    branches: [main, develop]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --run --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage/

  backend-quality:
    name: Backend Quality
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Black format check
        run: black --check .

      - name: mypy
        env:
          DJANGO_SETTINGS_MODULE: ptrack.settings
          SECRET_KEY: ${{ github.run_id }}-ci
          DEBUG: "True"
          DATABASE_URL: sqlite:///db.sqlite3
        run: mypy . --exclude venv

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ptrack
          POSTGRES_PASSWORD: ptrack
          POSTGRES_DB: ptrack_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests with coverage
        env:
          DJANGO_SETTINGS_MODULE: ptrack.settings
          SECRET_KEY: ${{ github.run_id }}-ci
          DEBUG: "True"
          DATABASE_URL: postgres://ptrack:ptrack@localhost:5432/ptrack_test
        run: pytest --tb=short

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: backend/coverage.xml

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: [frontend-quality, backend-test]
    defaults:
      run:
        working-directory: frontend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ptrack
          POSTGRES_PASSWORD: ptrack
          POSTGRES_DB: ptrack_e2e
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Migrate & seed
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: ptrack.settings
          SECRET_KEY: ${{ github.run_id }}-ci
          DEBUG: "True"
          DATABASE_URL: postgres://ptrack:ptrack@localhost:5432/ptrack_e2e
        run: python manage.py migrate --noinput

      - name: Start backend
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: ptrack.settings
          SECRET_KEY: ${{ github.run_id }}-ci
          DEBUG: "True"
          DATABASE_URL: postgres://ptrack:ptrack@localhost:5432/ptrack_e2e
          ALLOWED_HOSTS: localhost,127.0.0.1
        run: |
          python manage.py runserver 8000 &
          echo "Backend PID: $!"
          sleep 3

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        env:
          VITE_API_BASE_URL: http://localhost:8000/api/v1
          VITE_GOOGLE_CLIENT_ID: placeholder
          VITE_GOOGLE_MAPS_API_KEY: placeholder
          VITE_GOOGLE_MAPS_MAP_ID: placeholder
        run: npm run build

      - name: Serve frontend
        run: |
          npx serve dist -l 5173 --single &
          echo "Serve PID: $!"
          sleep 2

      - name: Run Playwright tests
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report/

  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}