[tool.ruff]
target-version = "py313"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "B", "W"]
ignore = ["B008", "B904", "E501"]

[tool.ruff.lint.isort]
known-first-party = ["accounts", "reports", "core", "recycling_centres", "nudges", "education", "utils"]

[tool.black]
line-length = 100
target-version = ["py313"]

[tool.mypy]
python_version = "3.13"
ignore_missing_imports = true
check_untyped_defs = false
warn_unused_ignores = false
warn_return_any = false
exclude = [
    "venv/",
    "migrations/",
]

[[tool.mypy.overrides]]
module = [
    "accounts.models",
    "accounts.otp",
    "reports.models",
    "core.models",
    "core.email",
    "core.sms",
    "core.notifications",
    "core.serializers",
    "core.admin_views",
    "nudges.models",
    "nudges.serializers",
    "recycling_centres.models",
    "recycling_centres.views",
    "education.models",
    "education.views",
    "push.models",
    "push.views",
    "push.helpers",
    "push.admin",
]
ignore_errors = true

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "ptrack.settings"
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
testpaths = ["tests"]
addopts = "--cov=. --cov-report=xml --cov-report=term-missing --cov-config=pyproject.toml --cov-fail-under=65"

[tool.coverage.run]
source = ["."]
omit = [
    "venv/*",
    "*/migrations/*",
    "*/tests/*",
    "manage.py",
    "ptrack/asgi.py",
    "ptrack/wsgi.py",
    # Management commands call tested business logic; cron boilerplate not worth unit-testing
    "*/management/commands/*",
    # External service wrappers — integration-tested in prod, not unit-tested
    "core/sms.py",
    "utils/email_service.py",
    # Demo data seeder — dev utility only
    "reports/management/*",
]